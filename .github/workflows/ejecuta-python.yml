name: Ejecucion de python
run-name: ${{ github.actor }} esta corriendo un archivo de python
on: [push]
jobs:
  ejecuta-script-python:
    runs-on: ubuntu-latest
    steps:
        - run: echo "Iniciando actions"
        - run: python --version
        - name: Check out repository code
          uses: actions/checkout@v6
        - run: ls -al
        - run: python app.py