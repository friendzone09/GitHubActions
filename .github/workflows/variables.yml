name: variables
run-name: ${{ github.actor }} esta usando variables
on: workflow_dispatch
env:
    DIA_DE_SEMANA: Lunes
jobs:
    saludo-variables:
        runs-on: ubuntu-latest
        env:
            SALUDO: Hola
        steps:
            - name: Saludar
              run: echo "$SALUDO, $NAME. Hoy es $DIA_DE_SEMANA"
              env:
                NOMBRE: Juan